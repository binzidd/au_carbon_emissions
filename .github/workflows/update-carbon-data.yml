name: Update Australia Carbon Emissions Data

on:
  schedule:
    # 1st of every month at 07:00 UTC (AEST 17:00 / AEDT 18:00)
    - cron: "0 7 1 * *"
  workflow_dispatch: # allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest emissions data
        run: node scripts/fetch-carbon-data.mjs

      - name: Commit updated data if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/carbon.ts
          # Only commit when something actually changed
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore: update Australia carbon emissions data [skip ci]"
            git push
            echo "Data updated and pushed."
          fi
